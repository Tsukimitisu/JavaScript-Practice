<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
   <p>Rock Paper Scissor</p>
    <button onclick="
         playGame('Rock');
    ">Rock</button>
    <button onclick="
        playGame('Paper');
    ">Paper</button>
    <button onclick="  
       playGame('Scissors');
    ">Scissors</button>
    <button onclick="
    score.wins = 0
    score.losses = 0
    score.tie = 0
    localStorage.removeItem('score')
    ">Reset Score</button>
</body>

<script>
    let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            tie: 0
        };

    /* if(!score){
        score = {
            wins: 0,
            losses: 0,
            tie: 0
        };
    }
*/

     let computersMove = '';
    
    function getComputersMove(){
        const randomNumber = Math.random();
       
        if(randomNumber >= 0 && randomNumber <1/3){
            computersMove = 'Scissors';  
        }else if (randomNumber >= 1/3 && randomNumber < 2/3){
            computersMove = 'Paper';        
        }else{  
            computersMove = 'Rock';
        }
        return computersMove;
        
    }

    function playGame(playersMove){
        const computersMove = getComputersMove();
        let result = '';
        if(playersMove === computersMove){
            result = 'Tie';
        }else if (
            (playersMove === 'Rock' && computersMove === 'Paper')||
            (playersMove === 'Scissors' && computersMove === 'Rock')||
            (playersMove === 'Paper' && computersMove === 'Scissprs')
        ){
            result = 'You Lose!';
        }else{
            result = 'You Win!';
        }

        if(result === 'You Win!'){
            score.wins += 1;
        }else if(result === 'You Lose!'){
            score.losses += 1;
        }else if(result === 'Tie'){
            score.tie += 1;
        }

        localStorage.setItem('score',JSON.stringify(score))

        alert(`You Choose ${playersMove}. Computer Choose ${computersMove}. The Result is ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.tie}`)
    }



</script>
</html>
