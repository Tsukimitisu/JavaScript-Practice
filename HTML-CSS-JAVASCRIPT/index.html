<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
       body{
        font-family: Arial, Helvetica, sans-serif;
    }

    .subscribe-btn{
        border: none;
        background-color: black;
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        margin-bottom: 30px;
    }

    .is-subscribed{
        background-color: rgb(240, 240, 240);
        color: black;
    }

    .cost-input{
        font-size: 15px;
        padding: 10px;
    
        
    }
    
    .calculate-btn{
        background-color: green;
        border: none;
        font-size: 15px;
        padding: 13px 15px;
        color: white;
        cursor: pointer;
    }
 

</style>
<body>
   <p>Youtube Subscribed Button</p>
   <button onclick="
  subscribe()
   " class="js-subBtn  subscribe-btn">Subscribe</button>

   <p>Amazon Shipping Calculator</p>
    <input type="number" onkeydown="handleKeyDown(event)" class="js-CostInput  cost-input"  placeholder="Cost of Order">
    <button onclick="
    CalculateTotal()
    " class="js-CalculateBtn calculate-btn">Calculate</button>
    <p class="js-result"></p>
</body>

<script>
    function handleKeyDown(event){
        if(event.key === 'Enter'){
                CalculateTotal()
            }
    }
function CalculateTotal(){
   const input = document.querySelector('.js-CostInput')
    const result = document.querySelector('.js-result')
    let cost = Number(input.value);

    if(cost < 40){
        cost = cost + 10;
    }

    result.innerHTML = `The Total Cost is: ${cost.toFixed(2)}$`
    
}

    function subscribe(){
         const button = document.querySelector('.js-subBtn')

   if(button.innerText === 'Subscribe'){
    button.innerText = 'Subscribed'
    button.classList.add('is-subscribed')
   }else{
    button.innerText = 'Subscribe'
    button.classList.remove('is-subscribed')
   }
    }
</script>
</html>
