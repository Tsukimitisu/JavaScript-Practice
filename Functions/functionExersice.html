<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <p>
      <button onclick="
        updateCalculation('1');
      ">1</button>

      <button onclick="
        updateCalculation('2');
      ">2</button>

      <button onclick="
        updateCalculation('3');
      ">3</button>

      <button onclick="
        updateCalculation(' + ');
      ">+</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('4');
      ">4</button>

      <button onclick="
        updateCalculation('5');
      ">5</button>

      <button onclick="
        updateCalculation('6');
      ">6</button>

      <button onclick="
        updateCalculation(' - ');
      ">-</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('7');
      ">7</button>

      <button onclick="
        updateCalculation('8');
      ">8</button>

      <button onclick="
        updateCalculation('9');
      ">9</button>

      <button onclick="
        updateCalculation(' * ');
      ">*</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('0');
      ">0</button>

      <button onclick="
        updateCalculation('.');
      ">.</button>

      <button onclick="
        // Note: eval() takes a string and runs it as code.
        // Avoid using eval() in real world projects since
        // it can potentially be given harmful code to run.
        // Only use eval() for learning purposes.
        calculation = eval(calculation);
        console.log(calculation);
      ">=</button>

      <button onclick="
        updateCalculation(' / ');
      ">/</button>
    </p>

    <p>
      <button onclick="
        calculation = '';
        console.log(calculation);
      ">Clear</button>
    </p>
 

</body>
<script>
    function greet(){
        console.log('Hello There!');
    }
    greet();

    function greetUser(name){
        console.log(`Hello There! ${name}`)
    }
    greetUser('James');
    function convertToFarenheit(celcius){
        let Fahrenheit = (celcius * 9/5) + 32
        console.log(Fahrenheit + 'F')
       
    }

    convertToFarenheit(25)
 
    function convertToCelcius(Fahrenheit){
        let celcius = (Fahrenheit - 32) * 5 / 9;
        console.log(celcius + 'C');

    }

    convertToCelcius(86)

    function convertTemperature(degrees, unit){
        if(unit === 'C'){
        convertToCelcius(degrees);
        }else if (unit === 'F'){
            convertToFarenheit(degrees)
        }else{
            console.log('Please Choose A unit F for Fahrenheit or C for Celcius')
        }
        
    }

    convertTemperature(86,'C')

    function convertLength(length, from, to){
        let result;
        if(from === 'miles' && to === 'km'){
           result = length * 1.6;
            console.log(result + ' ' + to)
        }else if(from === 'miles' && to === 'ft'){
           result = length * 5280;
            console.log(result + ' ' + to)
        }
        else if(from === 'km' && to === 'miles'){
            result = (length / 1.6) * 1
            console.log(result + ' ' + to)
        }else if(from === 'km' && to === 'ft'){
            result = length * 3281;
            console.log(result + ' ' + to)
        }
        else if(from !== 'km' && from !== 'miles' && from !== 'ft'){
            
            console.log(`Invalid unit: ${from}`)
        }else{
            console.log(length + to)
        }

    }
    convertLength(50,'miles','km')
    convertLength(32,'km','miles')
    convertLength(5,'miles','ft')
    convertLength(5,'lbs','lbs')

  let calculation = '';
   function updateCalculation(value) {
        calculation += value;
        console.log(calculation);
      }

</script>
</html>
