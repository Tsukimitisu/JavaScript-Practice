<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Quantity</title>
</head>
<body>
    <p>Cart Quantity</p>
    <p class="js-cart-status">Cart Quantity: 0</p>
    <button type="button" onclick="showQuantity()">Show Quantity</button>
    <button type="button" onclick="addToCart(1)">Add to Cart</button>
    <button type="button" onclick="addToCart(2)">+2</button>
    <button type="button" onclick="addToCart(3)">+3</button>
    <button type="button" onclick="addToCart(4)">+4</button>
    <button type="button" onclick="removeFromCart(1)">-1</button>
    <button type="button" onclick="resetCart()">Reset Cart</button>
</body>
<script>
    let cartQuantity = 0;
    const maxCartQuantity = 10;
    const cartStatusElement = document.querySelector('.js-cart-status');

    showQuantity();

    function showQuantity() {
        cartStatusElement.innerHTML = `Cart Quantity: ${cartQuantity}`;
        console.log(`Cart Quantity: ${cartQuantity}`);
    }

    function addToCart(amount) {
        if (cartQuantity >= maxCartQuantity) {
            alert('You have reached the maximum quantity allowed in the cart');
            showQuantity();
            return;
        }

        if (cartQuantity + amount > maxCartQuantity) {
            cartQuantity = maxCartQuantity;
            alert('You have reached the maximum quantity allowed in the cart');
        } else {
            cartQuantity += amount;
        }

        showQuantity();
    }

    function removeFromCart(amount) {
        if (cartQuantity === 0) {
            alert('Your cart is already empty');
            showQuantity();
            return;
        }

        cartQuantity -= amount;

        if (cartQuantity < 0) {
            cartQuantity = 0;
        }

        showQuantity();
    }

    function resetCart() {
        cartQuantity = 0;
        console.log('Cart Was Reset');
        showQuantity();
    }



</script>
</html>
