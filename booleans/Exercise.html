<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart Quantity</title>
</head>
<body>
    <p>Cart Quantity</p>
    <button onclick="showQuantity()">Show Quantity</button>
    <button onclick="addToCart(1)">Add to Cart</button>
    <button onclick="addToCart(2)">+2</button>
    <button onclick="addToCart(3)">+3</button>
    <button onclick="resetCart()">Reset Cart</button>
</body>
<script>
    let cartQuantity = 0;
    const maxCartQuantity = 10;

    function showQuantity() {
        console.log(`Cart Quantity: ${cartQuantity}`);
    }

    function addToCart(amount) {
        if (cartQuantity >= maxCartQuantity) {
            alert('You have reached the maximum quantity allowed in the cart');
            showQuantity();
            return;
        }

        if (cartQuantity + amount > maxCartQuantity) {
            cartQuantity = maxCartQuantity;
            alert('You have reached the maximum quantity allowed in the cart');
        } else {
            cartQuantity += amount;
        }

        showQuantity();
    }

    function resetCart() {
        cartQuantity = 0;
        console.log('Cart Was Reset');
        showQuantity();
    }



</script>
</html>
